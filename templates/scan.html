<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>WiFi Scan</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📡</text></svg>">
<link rel="stylesheet" href="/static/style.css">
<style>
.network-item {
  cursor: pointer;
  transition: all 0.2s;
}
.network-item:hover {
  background: rgba(0, 217, 255, 0.05);
}
.network-item.active-scan {
  cursor: default;
  opacity: 0.6;
}
@keyframes fadeIn {
  from { opacity: 0; background: rgba(76, 175, 80, 0.15); }
  to   { opacity: 1; background: transparent; }
}
@keyframes fadeOut {
  from { opacity: 1; max-height: 60px; }
  to   { opacity: 0; max-height: 0; }
}
tr.network-new {
  animation: fadeIn 1.5s ease-out;
}
tr.network-removed {
  animation: fadeOut 0.8s ease-in forwards;
}
.scan-status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  font-size: 0.85rem;
  color: #aaa;
}
.scan-status .spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  margin-right: 6px;
}
.scan-now-btn {
  background: linear-gradient(135deg, #00d9ff, #0099cc);
  border: none;
  color: #111;
  padding: 0.3rem 0.9rem;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
}
.scan-now-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>
<body>
<div id="container">
  <div class="header-flex">
    <div class="header-left">
      <a href="/" style="display:inline-block;margin-right:0.75rem;color:#00d9ff;text-decoration:none;font-size:1.5rem;">&larr;</a>
      <h1 style="margin:0;">WiFi Scan</h1>
    </div>
  </div>

  <div class="scan-status">
    <span id="network-count">Scanning for networks...</span>
    <span>
      <span id="last-scan" style="margin-right:0.5rem;"></span>
      <button class="scan-now-btn" id="scan-now-btn" onclick="manualScan()">Scan Now</button>
    </span>
  </div>

  <div style="overflow-x:auto;">
    <table class="data-table">
      <thead>
        <tr>
          <th>SSID</th>
          <th>Signal</th>
          <th>Ch</th>
          <th>Security</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="scan-results">
        <tr><td colspan="5" style="text-align:center;color:#888;padding:1rem;"><span class="spinner"></span> Scanning for networks...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="connect-section" class="hidden" style="margin-top:1rem;">
    <h2>Connect to Network</h2>
    <table class="form-table">
      <tr><td>Network</td><td><strong id="connect-ssid-display"></strong></td></tr>
      <tr><td>Password</td><td><input type="password" id="connect-password" placeholder="Enter WiFi password" style="width:100%;"></td></tr>
      <tr><td></td><td>
        <button class="ok-button" onclick="doConnect()" id="connect-btn">Connect</button>
        <button class="ok-button" onclick="cancelConnect()" style="background:linear-gradient(135deg,#555,#444);margin-top:0.25rem;">Cancel</button>
      </td></tr>
    </table>
    <div id="connect-message" class="message"></div>
  </div>

  <div style="margin-top:1.5rem;text-align:center;">
    <a href="/" class="nav-button" style="display:inline-block;padding:0.6rem 1.5rem;font-size:0.9rem;text-decoration:none;">🏠 Home</a>
  </div>
</div>

<script>
let connectSSID = null;
let connecting = false;
let scanPoll = null;
let scanTimer = null;
let lastScanTime = 0;
let scanInProgress = false;
const POLL_INTERVAL = 15000;

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function signalBars(pct, label) {
  const count = 5;
  const thresholds = [0, 20, 40, 60, 80];
  let cls = 'signal-poor';
  if (pct >= 80) cls = 'signal-excellent';
  else if (pct >= 60) cls = 'signal-good';
  else if (pct >= 40) cls = 'signal-fair';
  else if (pct >= 20) cls = 'signal-weak';
  const heights = [4, 7, 10, 13, 16];
  let html = '<span class="signal-bars">';
  for (let i = 0; i < count; i++) {
    const active = pct >= thresholds[i] ? ' active' : '';
    html += '<span class="bar' + active + ' ' + cls + '" style="height:' + heights[i] + 'px;"></span>';
  }
  html += '</span>';
  html += '<span style="font-size:0.75rem;color:#888;margin-left:4px;">' + label + '%</span>';
  return html;
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function getSsidKey(net) {
  return net.ssid;
}

function formatTime(ts) {
  const secs = Math.floor((Date.now() - ts) / 1000);
  if (secs < 5) return 'just now';
  if (secs < 60) return secs + 's ago';
  const m = Math.floor(secs / 60);
  return m + 'm ' + (secs % 60) + 's ago';
}

function updateTimerDisplay() {
  const el = document.getElementById('last-scan');
  if (lastScanTime > 0) {
    el.textContent = formatTime(lastScanTime);
  }
}

function stopTimer() {
  if (scanTimer) {
    clearInterval(scanTimer);
    scanTimer = null;
  }
}

function startTimer() {
  stopTimer();
  scanTimer = setInterval(updateTimerDisplay, 5000);
  updateTimerDisplay();
}

function stopPolling() {
  if (scanPoll) {
    clearInterval(scanPoll);
    scanPoll = null;
  }
}

function startPolling() {
  stopPolling();
  scanPoll = setInterval(backgroundScan, POLL_INTERVAL);
}

async function manualScan() {
  if (scanInProgress) return;
  const btn = document.getElementById('scan-now-btn');
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  await backgroundScan();
  btn.disabled = false;
  btn.textContent = 'Scan Now';
}

function enableLoadingState() {
  const countEl = document.getElementById('network-count');
  countEl.innerHTML = '<span class="spinner"></span> Scanning...';
}

function disableLoadingState(count) {
  const countEl = document.getElementById('network-count');
  countEl.textContent = 'Found ' + count + ' network' + (count !== 1 ? 's' : '') + '.';
}

async function backgroundScan() {
  const tbody = document.getElementById('scan-results');
  const hasInitialData = tbody.querySelector('tr[data-ssid]') !== null;

  if (!hasInitialData) {
    enableLoadingState();
  }

  try {
    const r = await fetch('/api/scan');
    const data = await r.json();
    const nets = data.networks || [];
    const connectedSsid = data.connected_ssid;
    lastScanTime = Date.now();
    updateTimerDisplay();
    scanInProgress = false;
    startTimer();

    applyDiff(tbody, nets, connectedSsid);
    disableLoadingState(nets.length);
  } catch {
    if (!hasInitialData) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#f44336;padding:1rem;">Scan failed. Try again.</td></tr>';
      document.getElementById('network-count').textContent = 'Scan failed.';
    }
    scanInProgress = false;
  }
}

function applyDiff(tbody, nets, connectedSsid) {
  if (nets.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:1rem;">No networks found.</td></tr>';
    return;
  }

  nets.sort((a, b) => b.signal - a.signal);

  // Build a map of current rows by SSID
  const existing = new Map();
  const rows = tbody.querySelectorAll('tr[data-ssid]');
  for (const row of rows) {
    existing.set(row.getAttribute('data-ssid'), row);
  }

  // Build a set of incoming SSIDs
  const incoming = new Set(nets.map(getSsidKey));

  // Remove rows for networks no longer visible
  for (const [ssid, row] of existing) {
    if (!incoming.has(ssid)) {
      row.className = 'network-removed';
      setTimeout(function() { if (row.parentNode) row.parentNode.removeChild(row); }, 800);
    }
  }

  // Add or update rows
  let firstNew = null;
  for (const net of nets) {
    const key = getSsidKey(net);
    const existingRow = existing.get(key);

    if (existingRow) {
      // Update signal and connected badge in-place
      const signalTd = existingRow.querySelectorAll('td')[1];
      if (signalTd) {
        signalTd.innerHTML = signalBars(net.signal, net.signal);
      }
      const actionTd = existingRow.querySelectorAll('td')[4];
      if (actionTd) {
        if (net.ssid === connectedSsid) {
          actionTd.innerHTML = '<span class="connected-badge">Connected</span>';
        } else if (!actionTd.querySelector('button')) {
          actionTd.innerHTML = '<button class="red-button" onclick="selectNetwork(\'' + escapeAttr(net.ssid) + '\',\'' + escapeAttr(net.security || '') + '\')">Connect</button>';
        }
      }
      // Update connected badge in SSID cell
      const ssidTd = existingRow.querySelectorAll('td')[0];
      const badgeEl = ssidTd.querySelector('.connected-badge');
      if (net.ssid === connectedSsid && !badgeEl) {
        ssidTd.innerHTML = '<strong>' + escapeHtml(net.ssid) + '</strong> <span class="connected-badge">Connected</span>';
      } else if (net.ssid !== connectedSsid && badgeEl) {
        ssidTd.innerHTML = '<strong>' + escapeHtml(net.ssid) + '</strong>';
      }
      // Update security icon
      const secTd = existingRow.querySelectorAll('td')[3];
      const lock = net.security && net.security !== '' && net.security !== '--' ? '🔒' : '🔓';
      secTd.innerHTML = escapeHtml(net.security || 'Open') + ' ' + lock;
    } else {
      // New network - create row
      const tr = document.createElement('tr');
      tr.className = 'network-item network-new';
      tr.setAttribute('data-ssid', key);
      const badge = net.ssid === connectedSsid ? '<span class="connected-badge">Connected</span>' : '';
      const lock = net.security && net.security !== '' && net.security !== '--' ? '🔒' : '🔓';
      const ssidCell = '<td><strong>' + escapeHtml(net.ssid) + '</strong> ' + badge + '</td>';
      const signalCell = '<td>' + signalBars(net.signal, net.signal) + '</td>';
      const chCell = '<td>' + (net.channel || '--') + '</td>';
      const secCell = '<td>' + escapeHtml(net.security || 'Open') + ' ' + lock + '</td>';
      const actionCell = '<td>' +
        (net.ssid === connectedSsid
          ? '<span class="connected-badge">Connected</span>'
          : '<button class="red-button" onclick="selectNetwork(\'' + escapeAttr(net.ssid) + '\',\'' + escapeAttr(net.security || '') + '\')">Connect</button>'
        ) + '</td>';
      tr.innerHTML = ssidCell + signalCell + chCell + secCell + actionCell;
      tbody.appendChild(tr);
      if (!firstNew) firstNew = tr;
    }
  }

  // Scroll to first new network
  if (firstNew) {
    firstNew.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function selectNetwork(ssid, security) {
  if (connecting) return;
  connectSSID = ssid;
  document.getElementById('connect-ssid-display').textContent = ssid + ' (' + security + ')';
  document.getElementById('connect-password').value = '';
  document.getElementById('connect-section').classList.remove('hidden');
  document.getElementById('connect-password').focus();
  document.getElementById('connect-message').className = 'message';
}

function cancelConnect() {
  connectSSID = null;
  document.getElementById('connect-section').classList.add('hidden');
  document.getElementById('connect-message').className = 'message';
}

async function doConnect() {
  if (!connectSSID || connecting) return;
  const password = document.getElementById('connect-password').value;
  const btn = document.getElementById('connect-btn');
  const msg = document.getElementById('connect-message');
  connecting = true;
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  msg.className = 'message';

  try {
    const r = await fetch('/api/connect', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ssid: connectSSID, password: password}),
    });
    const data = await r.json();
    if (data.success) {
      msg.className = 'message success show';
      msg.textContent = 'Connected to ' + connectSSID + '!';
      setTimeout(backgroundScan, 2000);
    } else {
      msg.className = 'message error show';
      msg.textContent = data.error || 'Connection failed.';
    }
  } catch {
    msg.className = 'message error show';
    msg.textContent = 'Connection error. Please try again.';
  }
  btn.disabled = false;
  btn.textContent = 'Connect';
  connecting = false;
}

// Initial load and start polling
backgroundScan();
startPolling();
</script>
</body>
</html>
