<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<meta http-equiv="refresh" content="15">
<title>WiFi Scan</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📡</text></svg>">
<link rel="stylesheet" href="/static/style.css">
<style>
.network-item {
  cursor: pointer;
  transition: all 0.2s;
}
.network-item:hover {
  background: rgba(0, 217, 255, 0.05);
}
.network-item.active-scan {
  cursor: default;
  opacity: 0.6;
}
</style>
</head>
<body>
<div id="container">
  <div class="header-flex">
    <div class="header-left">
      <a href="/" style="display:inline-block;margin-right:0.75rem;color:#00d9ff;text-decoration:none;font-size:1.5rem;">&larr;</a>
      <h1 style="margin:0;">WiFi Scan</h1>
    </div>
  </div>
  <p class="refresh-note">Auto-refreshes every 15 seconds. <span id="network-count">Scanning...</span></p>

  <div style="overflow-x:auto;">
    <table class="data-table">
      <thead>
        <tr>
          <th>SSID</th>
          <th>Signal</th>
          <th>Ch</th>
          <th>Security</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="scan-results">
        <tr><td colspan="5" style="text-align:center;color:#888;padding:1rem;"><span class="spinner"></span> Scanning for networks...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="connect-section" class="hidden" style="margin-top:1rem;">
    <h2>Connect to Network</h2>
    <table class="form-table">
      <tr><td>Network</td><td><strong id="connect-ssid-display"></strong></td></tr>
      <tr><td>Password</td><td><input type="password" id="connect-password" placeholder="Enter WiFi password" style="width:100%;"></td></tr>
      <tr><td></td><td>
        <button class="ok-button" onclick="doConnect()" id="connect-btn">Connect</button>
        <button class="ok-button" onclick="cancelConnect()" style="background:linear-gradient(135deg,#555,#444);margin-top:0.25rem;">Cancel</button>
      </td></tr>
    </table>
    <div id="connect-message" class="message"></div>
  </div>

  <div style="margin-top:1.5rem;text-align:center;">
    <a href="/" class="nav-button" style="display:inline-block;padding:0.6rem 1.5rem;font-size:0.9rem;text-decoration:none;">🏠 Home</a>
  </div>
</div>

<script>
let connectSSID = null;
let connecting = false;

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function signalBars(pct, label) {
  const count = 5;
  const thresholds = [0, 20, 40, 60, 80];
  let cls = 'signal-poor';
  if (pct >= 80) cls = 'signal-excellent';
  else if (pct >= 60) cls = 'signal-good';
  else if (pct >= 40) cls = 'signal-fair';
  else if (pct >= 20) cls = 'signal-weak';
  const heights = [4, 7, 10, 13, 16];
  let html = '<span class="signal-bars">';
  for (let i = 0; i < count; i++) {
    const active = pct >= thresholds[i] ? ' active' : '';
    html += '<span class="bar' + active + ' ' + cls + '" style="height:' + heights[i] + 'px;"></span>';
  }
  html += '</span>';
  html += '<span style="font-size:0.75rem;color:#888;margin-left:4px;">' + label + '%</span>';
  return html;
}

async function loadNetworks() {
  const tbody = document.getElementById('scan-results');
  const countEl = document.getElementById('network-count');
  try {
    const r = await fetch('/api/scan');
    const data = await r.json();
    const nets = data.networks || [];
    const connectedSsid = data.connected_ssid;
    countEl.textContent = 'Found ' + nets.length + ' network' + (nets.length !== 1 ? 's' : '') + '.';

    if (nets.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:1rem;">No networks found.</td></tr>';
      return;
    }

    nets.sort((a, b) => b.signal - a.signal);
    tbody.innerHTML = '';
    for (const net of nets) {
      const tr = document.createElement('tr');
      tr.className = 'network-item';
      const badge = net.ssid === connectedSsid ? '<span class="connected-badge">Connected</span>' : '';
      const lock = net.security && net.security !== '' && net.security !== '--' ? '🔒' : '🔓';
      const ssidCell = '<td><strong>' + escapeHtml(net.ssid) + '</strong> ' + badge + '</td>';
      const signalCell = '<td>' + signalBars(net.signal, net.signal) + '</td>';
      const chCell = '<td>' + (net.channel || '--') + '</td>';
      const secCell = '<td>' + escapeHtml(net.security || 'Open') + ' ' + lock + '</td>';
      const actionCell = '<td>' +
        (net.ssid === connectedSsid
          ? '<span class="connected-badge">Connected</span>'
          : '<button class="red-button" onclick="selectNetwork(\'' + escapeHtml(net.ssid).replace(/'/g, "\\'") + '\',\'' + escapeHtml(net.security || '').replace(/'/g, "\\'") + '\')">Connect</button>'
        ) + '</td>';
      tr.innerHTML = ssidCell + signalCell + chCell + secCell + actionCell;
      tbody.appendChild(tr);
    }
  } catch {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#f44336;padding:1rem;">Scan failed. Please refresh.</td></tr>';
    countEl.textContent = 'Scan failed.';
  }
}

function selectNetwork(ssid, security) {
  if (connecting) return;
  connectSSID = ssid;
  document.getElementById('connect-ssid-display').textContent = ssid + ' (' + security + ')';
  document.getElementById('connect-password').value = '';
  document.getElementById('connect-section').classList.remove('hidden');
  document.getElementById('connect-password').focus();
  document.getElementById('connect-message').className = 'message';
}

function cancelConnect() {
  connectSSID = null;
  document.getElementById('connect-section').classList.add('hidden');
  document.getElementById('connect-message').className = 'message';
}

async function doConnect() {
  if (!connectSSID || connecting) return;
  const password = document.getElementById('connect-password').value;
  const btn = document.getElementById('connect-btn');
  const msg = document.getElementById('connect-message');
  connecting = true;
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  msg.className = 'message';

  try {
    const r = await fetch('/api/connect', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ssid: connectSSID, password: password}),
    });
    const data = await r.json();
    if (data.success) {
      msg.className = 'message success show';
      msg.textContent = 'Connected to ' + connectSSID + '!';
      setTimeout(loadNetworks, 2000);
    } else {
      msg.className = 'message error show';
      msg.textContent = data.error || 'Connection failed.';
    }
  } catch {
    msg.className = 'message error show';
    msg.textContent = 'Connection error. Please try again.';
  }
  btn.disabled = false;
  btn.textContent = 'Connect';
  connecting = false;
}

loadNetworks();
</script>
</body>
</html>
